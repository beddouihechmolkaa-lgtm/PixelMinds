<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 230" fill="none">
  <defs>
    <filter id="gv" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gc" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gs" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>

    <linearGradient id="lg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="lg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="lg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="hexFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="tg" x1="0" y1="0" x2="240" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#e2d9f3"/>
      <stop offset="30%"  stop-color="#c4b5fd"/>
      <stop offset="60%"  stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#e2d9f3"/>
    </linearGradient>
    <linearGradient id="tag" x1="0" y1="0" x2="240" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- ── HEXAGON FRAME ── -->
  <polygon points="120,6 192,46 192,126 120,166 48,126 48,46"
    fill="url(#hexFill)" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.45" filter="url(#gv)"/>
  <!-- Corner dots -->
  <circle cx="120" cy="6"   r="2.5" fill="#a855f7" opacity="0.9"/>
  <circle cx="192" cy="46"  r="2.5" fill="#7c3aed" opacity="0.9"/>
  <circle cx="192" cy="126" r="2.5" fill="#6366f1" opacity="0.9"/>
  <circle cx="120" cy="166" r="2.5" fill="#38bdf8" opacity="0.9"/>
  <circle cx="48"  cy="126" r="2.5" fill="#6366f1" opacity="0.9"/>
  <circle cx="48"  cy="46"  r="2.5" fill="#7c3aed" opacity="0.9"/>

  <!-- ── DATA STREAMS ── -->
  <line x1="90"  y1="6"  x2="90"  y2="32" stroke="#c084fc" stroke-width="0.7" stroke-dasharray="2,3" opacity="0.5"/>
  <line x1="120" y1="6"  x2="120" y2="28" stroke="#a855f7" stroke-width="0.7" stroke-dasharray="2,3" opacity="0.5"/>
  <line x1="150" y1="6"  x2="150" y2="32" stroke="#c084fc" stroke-width="0.7" stroke-dasharray="2,3" opacity="0.5"/>

  <!-- ── LAYER 1 — violet ── -->
  <ellipse cx="120" cy="42" rx="58" ry="16" fill="url(#lg1)" opacity="0.9" filter="url(#gv)"/>
  <ellipse cx="120" cy="42" rx="58" ry="16" fill="none" stroke="#d8b4fe" stroke-width="1" opacity="0.5"/>
  <ellipse cx="105" cy="39" rx="24" ry="5"  fill="white" opacity="0.07"/>
  <!-- dots on layer 1 -->
  <circle cx="88"  cy="42" r="2" fill="#f0abfc" opacity="0.95" filter="url(#gc)"/>
  <circle cx="120" cy="36" r="2" fill="#e9d5ff" opacity="0.95" filter="url(#gc)"/>
  <circle cx="152" cy="42" r="2" fill="#f0abfc" opacity="0.95" filter="url(#gc)"/>
  <line x1="88"  y1="42" x2="88"  y2="20" stroke="#d8b4fe" stroke-width="0.8" opacity="0.5"/>
  <line x1="120" y1="36" x2="120" y2="12" stroke="#f0abfc" stroke-width="0.8" opacity="0.6"/>
  <line x1="152" y1="42" x2="152" y2="24" stroke="#d8b4fe" stroke-width="0.8" opacity="0.5"/>

  <!-- ── LAYER 2 — indigo ── -->
  <ellipse cx="120" cy="82" rx="58" ry="16" fill="url(#lg2)" opacity="0.8"/>
  <ellipse cx="120" cy="82" rx="58" ry="16" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.4"/>
  <ellipse cx="106" cy="79" rx="20" ry="5"  fill="white" opacity="0.05"/>
  <!-- circuit lines -->
  <line x1="72"  y1="82" x2="98"  y2="82" stroke="#a5b4fc" stroke-width="1"   opacity="0.6"/>
  <line x1="103" y1="80" x2="135" y2="80" stroke="#c7d2fe" stroke-width="1"   opacity="0.5"/>
  <line x1="140" y1="82" x2="165" y2="82" stroke="#a5b4fc" stroke-width="1"   opacity="0.6"/>
  <circle cx="100" cy="82" r="1.5" fill="#a5b4fc" opacity="0.9"/>
  <circle cx="137" cy="80" r="1.5" fill="#c7d2fe" opacity="0.9"/>

  <!-- ── LAYER 3 — cyan ── -->
  <ellipse cx="120" cy="118" rx="58" ry="16" fill="url(#lg3)" opacity="0.7"/>
  <ellipse cx="120" cy="118" rx="58" ry="16" fill="none" stroke="#67e8f9" stroke-width="1" opacity="0.35"/>
  <ellipse cx="106" cy="115" rx="18" ry="4"  fill="white" opacity="0.05"/>
  <!-- waveform -->
  <polyline points="72,118 82,110 92,126 102,112 112,120 122,114 132,122 142,116 152,119 162,118"
    fill="none" stroke="#7dd3fc" stroke-width="1.5" stroke-linejoin="round" opacity="0.75"/>

  <!-- Side faces -->
  <polygon points="62,50 62,90 120,106 120,66"  fill="#4f46e5" opacity="0.15"/>
  <polygon points="178,50 178,90 120,106 120,66" fill="#7c3aed" opacity="0.10"/>
  <polygon points="62,90 62,130 120,146 120,106" fill="#1d4ed8" opacity="0.12"/>
  <polygon points="178,90 178,130 120,146 120,106" fill="#4f46e5" opacity="0.08"/>

  <!-- Base glow -->
  <ellipse cx="120" cy="144" rx="55" ry="8" fill="#7c3aed" opacity="0.10" filter="url(#gs)"/>

  <!-- ── AERO TEXT (centré à x=120) ── -->
  <!-- A : apex=70, left=54, right=86 -->
  <line x1="54"  y1="207" x2="70"  y2="172" stroke="url(#tg)" stroke-width="2.5" stroke-linecap="round" filter="url(#gc)"/>
  <line x1="86"  y1="207" x2="70"  y2="172" stroke="url(#tg)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="59"  y1="196" x2="81"  y2="196" stroke="url(#tg)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- sparkle ✦ -->
  <g filter="url(#gv)" opacity="0.95">
    <line x1="70" y1="174" x2="70" y2="182" stroke="#f0abfc" stroke-width="1.3"/>
    <line x1="66" y1="178" x2="74" y2="178" stroke="#f0abfc" stroke-width="1.3"/>
    <line x1="67" y1="175" x2="73" y2="181" stroke="#f0abfc" stroke-width="0.8"/>
    <line x1="73" y1="175" x2="67" y2="181" stroke="#f0abfc" stroke-width="0.8"/>
  </g>

  <!-- E : x=96→116 -->
  <line x1="96"  y1="172" x2="96"  y2="207" stroke="url(#tg)" stroke-width="2.5" stroke-linecap="round" filter="url(#gc)"/>
  <line x1="96"  y1="172" x2="116" y2="172" stroke="url(#tg)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="96"  y1="190" x2="114" y2="190" stroke="url(#tg)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="96"  y1="207" x2="116" y2="207" stroke="url(#tg)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- R : x=126→152 -->
  <line x1="126" y1="172" x2="126" y2="207" stroke="url(#tg)" stroke-width="2.5" stroke-linecap="round" filter="url(#gc)"/>
  <path d="M126,172 Q148,172 148,184 Q148,196 126,196" fill="none" stroke="url(#tg)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="133" y1="196" x2="152" y2="207" stroke="url(#tg)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- O : cx=170 -->
  <ellipse cx="170" cy="190" rx="15" ry="17.5" fill="none" stroke="url(#tg)" stroke-width="2.5" filter="url(#gc)"/>
  <ellipse cx="165" cy="184" rx="4" ry="3.5" fill="white" opacity="0.06"/>

  <!-- ── TAGLINE ── -->
  <text x="120" y="222" text-anchor="middle"
    font-family="'Space Grotesk','Inter',sans-serif"
    font-size="7" font-weight="600" letter-spacing="2.8"
    fill="url(#tag)" opacity="0.75">
    OBSERVE · UNDERSTAND · ELEVATE
  </text>
  <line x1="60" y1="227" x2="180" y2="227" stroke="url(#tag)" stroke-width="0.4" opacity="0.25"/>
  <circle cx="120" cy="227" r="1.5" fill="#8b5cf6" opacity="0.5"/>
</svg>

